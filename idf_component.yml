# FloatSwitch Component Manifest
version: "1.0.1"
description: "FloatSwitch component for ESP-IDF."
maintainers:
  - "Aluizio Tomazelli <aluiziotomazelli@gmail.com>"
  

license: "MIT"

tags:
  - floatswitch
  - esp32
  - cpp

targets:
  - esp32
  - esp32s3
  - esp32c3
  - linux

dependencies:
  idf: ">=5.0"

files:
  use_gitignore: true
  exclude:
    - "host_test/**/*"
    - "test_apps/**/*"
    - "legacy_*/**/*"
    - .clang-format
    - .gitignore
    
  
examples:
  - path: "examples/basic_usage"


url: "https://github.com/aluiziotomazelli/floatswitch"
repository: "https://github.com/aluiziotomazelli/floatswitch"

